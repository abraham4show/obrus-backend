services:
  - type: web
    name: obrus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application
    releaseCommand: python manage.py collectstatic --noinput
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: obrus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://obrus.netlify.app
