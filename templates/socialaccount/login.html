{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="flex justify-center items-center min-h-screen">
 <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full">
  <div class="text-center mb-6">
   <img src="https://via.placeholder.com/80?text=Obrus+Apex" alt="Obrus Apex" class="w-20 h-20 mx-auto mb-4">
   <h1 class="text-2xl font-bold text-gray-800">{% trans "Sign In Via Google" %}</h1>
  </div>

  <p class="text-gray-600 text-center mb-6">
   {% trans "You are about to sign in using a third-party account from Google." %}
  </p>

  <form method="post">
   {% csrf_token %}
   <button type="submit"
    class="w-full bg-[#1a2e46] text-white py-3 rounded-xl font-semibold hover:bg-[#257242] transition duration-300">
    {% trans "Continue" %}
   </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-6">
   {% trans "By continuing, you agree to our Terms of Service." %}
  </p>
 </div>
</div>
{% endblock %}
